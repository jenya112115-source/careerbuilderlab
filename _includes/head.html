<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0B1020">
{% if page.noindex or page.draft_notice or page.available == false %}
<meta name="robots" content="noindex, nofollow">
{% endif %}
{% seo %}
<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,500;8..60,650&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
{% include analytics.html %}
<script>
  (function () {
    var storedTheme = localStorage.getItem('theme');
    var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.dataset.theme = storedTheme || (systemDark ? 'dark' : 'light');
  })();
</script>
